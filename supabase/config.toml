# Supabase Configuration

# Expose bexly schema (and other schemas) via PostgREST
[api]
schemas = ["public", "graphql_public", "web3", "bexly", "stripe", "dosai", "dosafe"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[functions.ai-proxy]
verify_jwt = false  # Manual JWT verification via supabase.auth.getUser() inside function

[functions.telegram-webhook]
verify_jwt = false  # Disable JWT verification for Telegram webhook (public endpoint)

[functions.link-telegram]
verify_jwt = false  # Manual JWT verification against DOS ID project (JWT issued by different project)

[functions.unlink-telegram]
verify_jwt = true  # Keep JWT verification for unlinking (requires user auth)

[functions.create-short-link]
verify_jwt = false  # Public endpoint for Telegram bot to create short links

[functions.tingee-webhook]
verify_jwt = false  # Tingee Open Banking webhook — auth via HMAC-SHA512 signature, not Supabase JWT

[functions.tingee-link]
verify_jwt = false  # Manual JWT verification inside the function so we can return JSON 401 with CORS headers
